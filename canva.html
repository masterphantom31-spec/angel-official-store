<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canva Pro Subscription | Angel Official Store</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Special Row-by-Row Layout for OTT/App Packages */
        .ott-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 0 15px;
        }
        .ott-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .ott-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 255, 204, 0.4);
        }
        .ott-card.selected {
            border-color: #00ffcc;
            background: rgba(0, 255, 204, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.15);
        }
        
        /* Left Side: Logo and Device/Time */
        .ott-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .ott-info img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            border-radius: 8px;
        }
        .ott-text h3 {
            margin: 0;
            font-size: 15px;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        /* Right Side: Price and Profile Type */
        .ott-right {
            text-align: right;
        }
        .ott-price {
            font-size: 18px;
            color: #00ffcc;
            font-weight: bold;
        }
        .ott-profile-type {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
        }

        /* Gmail Input Styling */
        .custom-input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #ffffff;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        .custom-input:focus {
            border-color: #00ffcc;
        }
    </style>
</head>
<body>

    <header>
        <a href="javascript:history.back()" style="color: #00ffcc; text-decoration: none; font-size: 24px; margin-right: 15px;">←</a>
        <h1>Canva Pro</h1>
    </header>

    <main>
        <section id="player-info-section" style="margin-bottom: 25px; padding: 0 15px;">
            <h2 style="font-size: 18px; margin-bottom: 10px; color: #fff;">1. Enter Account Details</h2>
            <div class="input-group">
                <input type="email" id="gmail-input" class="custom-input" placeholder="Enter your Gmail address" required>
            </div>
        </section>

        <section id="diamond-selection">
            <h2 style="padding: 0 15px; font-size: 18px; margin-bottom: 10px; color: #fff;">2. Select Package</h2>
            
            <div class="ott-list">
                
                <div class="ott-card" onclick="selectPackage(this, '1 Month • Canva Pro', '₹60')">
                    <div class="ott-info">
                        <img src="canva-logo.png" alt="Canva">
                        <div class="ott-text">
                            <h3>1 Month • Canva Pro</h3>
                        </div>
                    </div>
                    <div class="ott-right">
                        <div class="ott-price">₹60</div>
                        <div class="ott-profile-type">(Private Profile)</div>
                    </div>
                </div>

                <div class="ott-card" onclick="selectPackage(this, '1 Year • Canva Pro', '₹299')">
                    <div class="ott-info">
                        <img src="canva-logo.png" alt="Canva">
                        <div class="ott-text">
                            <h3>1 Year • Canva Pro</h3>
                        </div>
                    </div>
                    <div class="ott-right">
                        <div class="ott-price">₹299</div>
                        <div class="ott-profile-type">(Private Profile)</div>
                    </div>
                </div>

                <div class="ott-card" onclick="selectPackage(this, 'Lifetime • Canva Pro', '₹499')">
                    <div class="ott-info">
                        <img src="canva-logo.png" alt="Canva">
                        <div class="ott-text">
                            <h3>Lifetime • Canva Pro</h3>
                        </div>
                    </div>
                    <div class="ott-right">
                        <div class="ott-price">₹499</div>
                        <div class="ott-profile-type">(Private Profile)</div>
                    </div>
                </div>

            </div>
        </section>

        <section id="checkout-section" style="margin-top: 30px;">
            <button id="order-now-btn">Complete Order Now</button>
        </section>
    </main>

    <script>
        let selectedPackage = "";
        let selectedPrice = "";

        // Highlight the clicked row
        function selectPackage(card, packageName, price) {
            document.querySelectorAll('.ott-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedPackage = packageName;
            selectedPrice = price;
        }

        // Send to payment page with validation
        document.getElementById('order-now-btn').addEventListener('click', () => {
            const gmailValue = document.getElementById('gmail-input').value.trim();

            // 1. Check if Gmail is empty
            if (!gmailValue) {
                alert("Please enter your Gmail address!");
                return;
            }

            // 2. Check if a package is selected
            if (!selectedPackage) {
                alert("Please select a package first!");
                return;
            }

            // Save details to LocalStorage (passing the Gmail as the 'Player ID')
            localStorage.setItem("order_game", "Canva Pro");
            localStorage.setItem("order_playerId", gmailValue); 
            localStorage.setItem("order_zoneId", "N/A");       
            localStorage.setItem("order_package", selectedPackage);
            localStorage.setItem("order_price", selectedPrice);

            window.location.href = "payment.html";
        });
    </script>
</body>
</html>
