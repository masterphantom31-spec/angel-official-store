<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angel Official Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div id="hamburger-icon">☰</div>
        <h1>Angel Official Store</h1>
    </header>

    <nav id="side-menu">
        <ul>
            <li>Home</li>
            <li>Games</li>
            <li>Social Media Boosting</li>
            <li>OTT Platforms</li>
        </ul>
    </nav>

    <main>
        <section id="poster-slider">
            <div class="slider-container">
                <img src="poster1.jpg" alt="Promo Poster 1" class="slide">
                <img src="poster2.jpg" alt="Promo Poster 2" class="slide">
                <img src="poster3.jpg" alt="Promo Poster 3" class="slide">
                <img src="poster4.jpg" alt="Promo Poster 4" class="slide">
            </div>
        </section>

        <section id="live-purchase-bar">
            <div id="purchase-notification">
                <p><span id="buyer-name">User99</span> just bought <span id="item-bought">Weekly Diamond Pass</span>!</p>
            </div>
        </section>

        <section id="games-section">
            <h2>Games</h2>
            <div class="icon-grid">
                <div class="icon-card" id="mlbb-icon">
                    <img src="mlbb-icon.png" alt="Mobile Legends: Bang Bang">
                    <p>MLBB</p>
                </div>
                <div class="icon-card" id="other-game-icon">
                    <img src="other-game.png" alt="Other Game">
                    <p>Other Game</p>
                </div>
            </div>
        </section>

        <section id="social-media-section">
            <h2>Social Media Boosting</h2>
            <div class="icon-grid">
                <div class="icon-card">
                    <img src="instagram-icon.png" alt="Instagram Services">
                    <p>Instagram</p>
                </div>
                <div class="icon-card">
                    <img src="telegram-icon.png" alt="Telegram Services">
                    <p>Telegram</p>
                </div>
            </div>
        </section>

        <section id="ott-section">
            <h2>OTT Subscriptions</h2>
            <div class="icon-grid">
                <div class="icon-card">
                    <img src="netflix-icon.png" alt="Netflix Subscriptions">
                    <p>Netflix</p>
                </div>
                <div class="icon-card">
                    <img src="spotify-icon.png" alt="Spotify Subscriptions">
                    <p>Spotify</p>
                </div>
            </div>
        </section>
    </main>

    <a href="https://wa.me/919383300728" id="whatsapp-float" target="_blank">
        <img src="whatsapp-logo.png" alt="WhatsApp Customer Care">
    </a>

    <script src="script.js"></script>
</body>
</html>
