<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angel Official Store</title>
    <style>
        /* COLOR THEMES */
        :root {
            --pink: #ff007f;
            --bg: #000000;
            --card: #111111;
        }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* HEADER */
        header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            background: #000;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
            color: var(--pink);
            text-transform: uppercase;
            text-decoration: none;
            margin-left: 15px;
        }

        /* HAMBURGER BUTTON */
        #menu-toggle { display: none; }
        
        .menu-icon { 
            font-size: 30px; 
            cursor: pointer; 
            color: var(--pink); 
            display: block;
        }

        /* THE SLIDE-OUT MENU */
        .nav-menu {
            position: fixed;
            top: 0;
            left: -100%; /* Hidden by default */
            width: 280px;
            height: 100%;
            background-color: #000000; /* Solid Black */
            border-right: 2px solid var(--pink);
            transition: 0.3s;
            z-index: 9999; /* Forces it to the VERY top layer */
            padding-top: 60px;
        }

        /* THE LINKS INSIDE (The part that was blank) */
        .nav-menu a {
            display: block;
            padding: 20px 30px;
            color: #ffffff !important; /* Force White */
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 1px solid #222;
        }

        /* SHOW MENU WHEN CLICKED */
        #menu-toggle:checked ~ .nav-menu {
            left: 0;
        }

        /* CLOSE OVERLAY */
        .menu-close-area {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 500;
        }

        #menu-toggle:checked ~ .menu-close-area {
            display: block;
        }

        /* GRID CONTENT */
        .section-title { text-align: left; padding: 20px; font-size: 22px; font-weight: bold; }
        .featured-container { display: flex; overflow-x: auto; gap: 12px; padding: 0 20px 20px; }
        .offer-card { min-width: 200px; background: #0f0f0f; border-radius: 15px; padding: 15px; border: 1px solid #222; text-align: left; }
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .game-card { background: var(--card); border-radius: 15px; padding: 10px; border: 1px solid #222; }
        .game-img { width: 100%; aspect-ratio: 1/1; background: #222; border-radius: 10px; margin-bottom: 8px; }
        .btn-main { background: var(--pink); color: black; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="menu-close-area"></label>

    <header>
        <label for="menu-toggle" class="menu-icon">&#9776;</label>
        <a href="#" class="logo">Angel Official Store</a>
        
        <nav class="nav-menu">
            <a href="#">Home</a>
            <a href="#">My Orders</a>
            <a href="#">Support</a>
            <a href="#">Terms & Conditions</a>
        </nav>
    </header>

    <div class="section-title">Featured Offers</div>
    <div class="featured-container">
        <div class="offer-card">
            <div style="color: #777; font-size: 13px;">Weekly Pass</div>
            <div style="font-size: 18px; font-weight: bold; margin: 8px 0;">INR 150</div>
            <button class="btn-main">BUY NOW</button>
        </div>
        <div class="offer-card">
            <div style="color: #777; font-size: 13px;">60 UC</div>
            <div style="font-size: 18px; font-weight: bold; margin: 8px 0;">INR 80</div>
            <button class="btn-main">BUY NOW</button>
        </div>
    </div>

    <div class="section-title">Select Game</div>
    <div class="game-grid">
        <div class="game-card"><div class="game-img"></div><strong>Mobile Legends</strong></div>
        <div class="game-card"><div class="game-img"></div><strong>BGMI</strong></div>
        <div class="game-card"><div class="game-img"></div><strong>Free Fire</strong></div>
        <div class="game-card"><div class="game-img"></div><strong>Honor of Kings</strong></div>
    </div>

</body>
</html>
