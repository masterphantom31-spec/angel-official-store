<!DOCTYPE html>
<html>
<head>
    <title>Angel Official Store</title>
    <style>
        /* This is the CSS area - where we change colors and styles! */
        body { 
            background-color: #000000; /* Black background */
            color: #ffffff; /* White text */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        
        .store-title {
            color: #ff007f; /* Neon pink title */
            font-size: 40px;
            letter-spacing: 2px;
        }

        .product-box {
            border: 2px solid #333;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1 class="store-title">Welcome to Angel Official Store</h1>
    <p>Premium digital products and top-ups.</p>

    <div class="product-box">
        <h2>MLBB Diamonds</h2>
        <p>Price: ₹99</p>
    </div>

</body>
</html>
