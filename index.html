<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angel Official Store | Top-up Center</title>
    <style>
        :root {
            --primary-pink: #ff007f;
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            overflow-x: hidden;
        }

        /* HEADER SECTION */
        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #222;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary-pink);
            text-transform: uppercase;
            text-decoration: none;
        }

        /* HAMBURGER MENU */
        #menu-toggle { display: none; }
        .menu-icon { font-size: 30px; cursor: pointer; color: var(--primary-pink); }

        .nav-menu {
            position: fixed;
            top: 0;
            left: -100%;
            width: 80%;
            max-width: 300px;
            height: 100%;
            background: var(--dark-bg);
            transition: 0.4s;
            z-index: 999;
            padding-top: 80px;
            text-align: left;
            border-right: 2px solid var(--primary-pink);
        }

        .nav-menu a {
            display: block;
            padding: 20px 30px;
            color: white;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid #1a1a1a;
        }

        #menu-toggle:checked ~ .nav-menu { left: 0; }

        /* FEATURED OFFERS SECTION */
        .section-title {
            text-align: left;
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
            color: var(--text-main);
        }

        .featured-container {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 0 20px 20px 20px;
            scrollbar-width: none; /* Hides scrollbar on Firefox */
        }

        .offer-card {
            min-width: 200px;
            background: linear-gradient(145deg, #1e1e1e, #111);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #333;
            text-align: left;
            position: relative;
        }

        .hot-tag {
            background: var(--primary-pink);
            color: black;
            font-size: 12px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 5px;
            position: absolute;
            top: 10px;
            right: 10px;
        }

        /* GAME SELECTION GRID */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 10px;
            border: 1px solid #222;
            transition: 0.3s;
            text-decoration: none;
            color: white;
        }

        .game-card:hover {
            border-color: var(--primary-pink);
            transform: translateY(-5px);
        }

        .game-img {
            width: 100%;
            aspect-ratio: 1/1;
            background: #333;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .game-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .game-category {
            font-size: 12px;
            color: var(--primary-pink);
            text-transform: uppercase;
            font-weight: bold;
        }

        /* CUSTOM BUTTON */
        .btn-main {
            background: var(--primary-pink);
            color: black;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <header>
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="menu-icon">&#9776;</label>
        <a href="#" class="logo">Angel Store</a>
        <div style="width: 30px;"></div> <nav class="nav-menu">
            <a href="#">Home</a>
            <a href="#">My Orders</a>
            <a href="#">Support</a>
            <a href="#">Terms</a>
        </nav>
    </header>

    <div class="section-title">Featured Offers</div>
    
    <div class="featured-container">
        <div class="offer-card">
            <span class="hot-tag">HOT</span>
            <div style="font-size: 14px; color: var(--text-dim);">Weekly Pass</div>
            <div style="font-size: 18px; font-weight: bold; margin: 5px 0;">INR 150</div>
            <button class="btn-main">Buy Now</button>
        </div>
        <div class="offer-card">
            <span class="hot-tag">HOT</span>
            <div style="font-size: 14px; color: var(--text-dim);">60 UC</div>
            <div style="font-size: 18px; font-weight: bold; margin: 5px 0;">INR 80</div>
            <button class="btn-main">Buy Now</button>
        </div>
    </div>

    <div class="section-title">Select Game</div>

    <div class="game-grid">
        <a href="#" class="game-card">
            <div class="game-img" style="background-image: url('https://via.placeholder.com/150'); background-size: cover;"></div>
            <div class="game-name">Mobile Legends</div>
            <div class="game-category">MOBA</div>
        </a>

        <a href="#" class="game-card">
            <div class="game-img" style="background-image: url('https://via.placeholder.com/150'); background-size: cover;"></div>
            <div class="game-name">BGMI</div>
            <div class="game-category">FPS</div>
        </a>

        <a href="#" class="game-card">
            <div class="game-img" style="background-image: url('https://via.placeholder.com/150'); background-size: cover;"></div>
            <div class="game-name">Free Fire</div>
            <div class="game-category">FPS</div>
        </a>

        <a href="#" class="game-card">
            <div class="game-img" style="background-image: url('https://via.placeholder.com/150'); background-size: cover;"></div>
            <div class="game-name">Honor of Kings</div>
            <div class="game-category">MOBA</div>
        </a>
    </div>

</body>
</html>
