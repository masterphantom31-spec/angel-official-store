<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angel Official Store</title>
    <style>
        :root {
            --primary-pink: #ff007f;
            --dark-bg: #000000;
            --card-bg: #111111;
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            padding: 15px 20px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            background: #000;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #222;
        }

        .logo {
            font-size: 18px;
            font-weight: 900;
            color: var(--primary-pink);
            text-transform: uppercase;
            text-decoration: none;
            margin-left: 15px;
        }

        /* MENU LOGIC */
        #menu-toggle { display: none; }
        
        .menu-icon { 
            font-size: 30px; 
            cursor: pointer; 
            color: var(--primary-pink); 
            z-index: 3000; 
            position: relative;
        }

        /* OVERLAY */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
            z-index: 1500;
        }

        /* FIXED NAV MENU */
        .nav-menu {
            position: fixed;
            top: 0;
            left: -100%;
            width: 75%;
            max-width: 280px;
            height: 100%;
            background: #000000;
            transition: 0.4s ease;
            z-index: 2000; /* Stays above overlay */
            padding-top: 80px;
            text-align: left;
            border-right: 2px solid var(--primary-pink);
            display: flex; /* Ensures items are aligned */
            flex-direction: column;
        }

        .nav-menu a {
            display: block;
            padding: 18px 25px;
            color: #ffffff !important; /* Forces white color */
            text-decoration: none;
            font-size: 20px;
            font-weight: 800;
            text-transform: uppercase;
            border-bottom: 1px solid #1a1a1a;
            z-index: 2100; /* Forces text to the front */
        }

        .nav-menu a:hover {
            color: var(--primary-pink) !important;
        }

        /* TOGGLE STATES */
        #menu-toggle:checked ~ .nav-menu { left: 0; }
        #menu-toggle:checked ~ .menu-overlay { 
            visibility: visible; 
            opacity: 1; 
        }

        /* GRID & CONTENT */
        .section-title { text-align: left; padding: 20px; font-size: 22px; font-weight: 800; }
        .featured-container { display: flex; overflow-x: auto; gap: 12px; padding: 0 20px 20px; scrollbar-width: none; }
        .offer-card { min-width: 200px; background: #0f0f0f; border-radius: 15px; padding: 15px; border: 1px solid #222; text-align: left; position: relative; }
        .hot-tag { background: var(--primary-pink); color: black; font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 4px; position: absolute; top: 10px; right: 10px; }
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .game-card { background: var(--card-bg); border-radius: 15px; padding: 10px; border: 1px solid #222; text-decoration: none; color: white; }
        .game-img { width: 100%; aspect-ratio: 1/1; background: #222; border-radius: 10px; margin-bottom: 8px; }
        .game-name { font-size: 14px; font-weight: 800; }
        .game-category { font-size: 10px; color: var(--primary-pink); font-weight: bold; text-transform: uppercase; }
        .btn-main { background: var(--primary-pink); color: black; border: none; padding: 12px; border-radius: 10px; font-weight: 900; width: 100%; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="menu-overlay"></label>

    <header>
        <label for="menu-toggle" class="menu-icon">&#9776;</label>
        <a href="#" class="logo">Angel Official Store</a>
        
        <nav class="nav-menu">
            <a href="#">Home</a>
            <a href="#">My Orders</a>
            <a href="#">Support</a>
            <a href="#">Terms & Conditions</a>
        </nav>
    </header>

    <div class="section-title">Featured Offers</div>
    <div class="featured-container">
        <div class="offer-card">
            <span class="hot-tag">HOT</span>
            <div style="color: #777; font-size: 13px;">Weekly Pass</div>
            <div style="font-size: 18px; font-weight: 900; margin: 8px 0;">INR 150</div>
            <button class="btn-main">BUY NOW</button>
        </div>
        <div class="offer-card">
            <span class="hot-tag">HOT</span>
            <div style="color: #777; font-size: 13px;">60 UC</div>
            <div style="font-size: 18px; font-weight: 900; margin: 8px 0;">INR 80</div>
            <button class="btn-main">BUY NOW</button>
        </div>
    </div>

    <div class="section-title">Select Game</div>
    <div class="game-grid">
        <div class="game-card">
            <div class="game-img"></div>
            <div class="game-name">Mobile Legends</div>
            <div class="game-category">MOBA</div>
        </div>
        <div class="game-card">
            <div class="game-img"></div>
            <div class="game-name">BGMI</div>
            <div class="game-category">FPS</div>
        </div>
        <div class="game-card">
            <div class="game-img"></div>
            <div class="game-name">Free Fire</div>
            <div class="game-category">FPS</div>
        </div>
        <div class="game-card">
            <div class="game-img"></div>
            <div class="game-name">Honor of Kings</div>
            <div class="game-category">MOBA</div>
        </div>
    </div>

</body>
</html>
