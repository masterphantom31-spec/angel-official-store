<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angel Official Store</title>
    <style>
        :root {
            --primary-pink: #ff007f;
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* HEADER */
        header {
            padding: 20px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            background: #000;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #222;
        }

        .logo {
            font-size: 20px;
            font-weight: 900;
            color: var(--primary-pink);
            text-transform: uppercase;
            text-decoration: none;
            margin-left: 20px;
        }

        /* MENU LOGIC */
        #menu-toggle { display: none; }
        
        /* Fixed: Hamburger icon is now z-index 3000 to be on the very top */
        .menu-icon { 
            font-size: 35px; 
            cursor: pointer; 
            color: var(--primary-pink); 
            z-index: 3000; 
            position: relative;
        }

        /* THE INVISIBLE CLICKABLE OVERLAY */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
            z-index: 1500; /* Stays below the nav-menu but above the content */
        }

        .nav-menu {
            position: fixed;
            top: 0;
            left: -100%;
            width: 80%;
            max-width: 300px;
            height: 100%;
            background: #000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000; /* Stays above the overlay */
            padding-top: 100px;
            text-align: left;
            border-right: 2px solid var(--primary-pink);
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.9);
        }

        .nav-menu a {
            display: block;
            padding: 20px 30px;
            color: white;
            text-decoration: none;
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
            border-bottom: 1px solid #111;
        }

        /* SHOW MENU AND OVERLAY WHEN CHECKED */
        #menu-toggle:checked ~ .nav-menu { left: 0; }
        #menu-toggle:checked ~ .menu-overlay { 
            visibility: visible; 
            opacity: 1; 
        }

        /* CONTENT STYLES */
        .section-title { text-align: left; padding: 20px; font-size: 24px; font-weight: 800; }
        .featured-container { display: flex; overflow-x: auto; gap: 15px; padding: 0 20px 20px; scrollbar-width: none; }
        .offer-card { min-width: 220px; background: #111; border-radius: 20px; padding: 20px; border: 1px solid #333; text-align: left; position: relative; }
        .hot-tag { background: var(--primary-pink); color: black; font-size: 12px; font-weight: bold; padding: 3px 10px; border-radius: 5px; position: absolute; top: 10px; right: 10px; }
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        .game-card { background: var(--card-bg); border-radius: 20px; padding: 12px; border: 1px solid #222; text-decoration: none; color: white; }
        .game-img { width: 100%; aspect-ratio: 1/1; background: #333; border-radius: 15px; margin-bottom: 10px; }
        .game-name { font-size: 16px; font-weight: 800; }
        .game-category { font-size: 11px; color: var(--primary-pink); font-weight: bold; text-transform: uppercase; }
        .btn-main { background: var(--primary-pink); color: black; border: none; padding: 14px; border-radius: 12px; font-weight: 900; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

    <input type="checkbox" id="menu-toggle">

    <label for="menu-toggle" class="menu-overlay"></label>

    <header>
        <label for="menu-toggle" class="menu-icon">&#9776;</label>
        <a href="#" class="logo">Angel Official Store</a>
        
        <nav class="nav-menu">
            <a href="#">Home</a>
            <a href="#">My Orders</a>
            <a href="#">Support</a>
            <a href="#">Terms & Conditions</a>
        </nav>
    </header>

    <div class="section-title">Featured Offers</div>
    
    <div class="featured-container">
        <div class="offer-card">
            <span class="hot-tag">HOT</span>
            <div style="color: #888; font-size: 14px;">Weekly Pass</div>
            <div style="font-size: 22px; font-weight: 900; margin: 10px 0;">INR 150</div>
            <button class="btn-main">BUY NOW</button>
        </div>
        <div class="offer-card">
            <span class="hot-tag">HOT</span>
            <div style="color: #888; font-size: 14px;">60 UC</div>
            <div style="font-size: 22px; font-weight: 900; margin: 10px 0;">INR 80</div>
            <button class="btn-main">BUY NOW</button>
        </div>
    </div>

    <div class="section-title">Select Game</div>

    <div class="game-grid">
        <div class="game-card">
            <div class="game-img"></div>
            <div class="game-name">Mobile Legends</div>
            <div class="game-category">MOBA</div>
        </div>
        <div class="game-card">
            <div class="game-img"></div>
            <div class="game-name">BGMI</div>
            <div class="game-category">FPS</div>
        </div>
        <div class="game-card">
            <div class="game-img"></div>
            <div class="game-name">Free Fire</div>
            <div class="game-category">FPS</div>
        </div>
        <div class="game-card">
            <div class="game-img"></div>
            <div class="game-name">Honor of Kings</div>
            <div class="game-category">MOBA</div>
        </div>
    </div>

</body>
</html>
