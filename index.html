
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angel Official Store</title>
    <style>
        /* GLOBAL STYLES */
        body {
            background-color: #000000; /* Deep black background */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* THE TITLE - MASSIVE & BOLD */
        .store-title {
            color: #ff007f; /* Your signature neon pink */
            font-size: 55px;
            font-weight: 900;
            text-transform: uppercase;
            margin-top: 100px;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(255, 0, 127, 0.7);
        }

        /* HAMBURGER MENU ICON */
        #menu-toggle { display: none; }
        .menu-icon {
            font-size: 50px;
            cursor: pointer;
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 100;
            color: #ff007f;
            text-shadow: 0 0 15px #ff007f;
        }

        /* SLIDE-OUT MENU CONTAINER */
        .nav-menu {
            position: fixed;
            top: 0;
            left: -320px; /* Fully hidden */
            width: 320px;
            height: 100%;
            background: #000000;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding-top: 100px;
            text-align: left;
            z-index: 99;
            border-right: 3px solid #ff007f;
        }

        /* MENU LINKS - BIG & BOLD */
        .nav-menu a {
            display: block;
            padding: 25px 35px;
            color: white;
            text-decoration: none;
            font-size: 28px;
            font-weight: 800;
            text-transform: uppercase;
            border-bottom: 1px solid #1a1a1a;
            transition: 0.3s;
        }

        .nav-menu a:hover {
            background: #ff007f;
            color: #000;
        }

        /* MENU OPEN LOGIC */
        #menu-toggle:checked ~ .nav-menu {
            left: 0;
        }

        /* PRODUCT BOXES - LARGE & PREMIUM */
        .product-box {
            border: 3px solid #ff007f;
            background: rgba(255, 255, 255, 0.03);
            padding: 60px 20px; /* Very tall and spacious */
            margin: 40px auto;
            width: 85%;
            max-width: 500px;
            border-radius: 30px;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.2);
            transition: 0.3s;
        }

        .product-box:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(255, 0, 127, 0.4);
        }

        .product-box h2 {
            font-size: 40px; /* Massive product names */
            margin-bottom: 15px;
            font-weight: 800;
        }

        .product-box p {
            font-size: 26px; /* Clear pricing/info */
            color: #cccccc;
            margin: 0;
        }

    </style>
</head>
<body>

    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="menu-icon">&#9776;</label>

    <nav class="nav-menu">
        <a href="#">Home</a>
        <a href="#">Games Top-up</a>
        <a href="#">Game Plays</a>
        <a href="#">Social Media</a>
        <a href="#">About Angel</a>
    </nav>

    <h1 class="store-title">Angel Official</h1>

    <div class="product-box">
        <h2>MLBB DIAMONDS</h2>
        <p>Instant Delivery</p>
        <p style="color: #ff007f; font-weight: bold; margin-top: 15px;">STARTING AT ₹99</p>
    </div>

    <div class="product-box">
        <h2>PREMIUM SUBS</h2>
        <p>100% Safe & Official</p>
    </div>

</body>
</html>
