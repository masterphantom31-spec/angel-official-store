<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Top-Up - Angel Official Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="index.html" style="color: #00ffcc; text-decoration: none; font-size: 24px; margin-right: 15px;">←</a>
        <h1>MLBB Top-Up</h1>
    </header>

    <main>
        <section id="player-info-section">
            <h2>1. Enter Account Details</h2>
            <div class="input-group">
                <input type="text" id="player-id" placeholder="Enter Player ID" required>
                <input type="text" id="zone-id" placeholder="(Server/Zone ID)" required>
            </div>
        </section>

        <section id="diamond-selection">
            <h2>2. Select Recharge Amount</h2>
            <div class="diamond-grid">
                
                <div class="diamond-card">
                    <img src="diamond-icon.png" alt="Diamonds">
                    <div class="diamond-details">
                        <p class="amount">86 Diamonds</p>
                        <p class="price">₹150</p>
                    </div>
                </div>

                <div class="diamond-card">
                    <img src="diamond-icon.png" alt="Diamonds">
                    <div class="diamond-details">
                        <p class="amount">172 Diamonds</p>
                        <p class="price">₹300</p>
                    </div>
                </div>

                <div class="diamond-card">
                    <img src="weekly-pass.png" alt="Weekly Pass">
                    <div class="diamond-details">
                        <p class="amount">Weekly Pass</p>
                        <p class="price">₹160</p>
                    </div>
                </div>

            </div>
        </section>

        <section id="checkout-section">
            <button id="order-now-btn">Complete Order Now</button>
        </section>
    </main>

</body>
</html>
