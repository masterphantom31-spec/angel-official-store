<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Subscription | Angel Official Store</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Special Row-by-Row Layout for OTT Packages */
        .ott-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 0 15px;
        }
        .ott-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .ott-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 255, 204, 0.4);
        }
        .ott-card.selected {
            border-color: #00ffcc;
            background: rgba(0, 255, 204, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.15);
        }
        
        /* Left Side: Logo and Device/Time */
        .ott-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .ott-info img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            border-radius: 8px;
        }
        .ott-text h3 {
            margin: 0;
            font-size: 15px;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        /* Right Side: Price and Profile Type */
        .ott-right {
            text-align: right;
        }
        .ott-price {
            font-size: 18px;
            color: #00ffcc;
            font-weight: bold;
        }
        .ott-profile-type {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <header>
        <a href="javascript:history.back()" style="color: #00ffcc; text-decoration: none; font-size: 24px; margin-right: 15px;">←</a>
        <h1>Netflix</h1>
    </header>

    <main>
        <section id="diamond-selection">
            <h2>Select Package</h2>
            
            <div class="ott-list">
                
                <div class="ott-card" onclick="selectPackage(this, '1 Device • 10 Days (Private Profile)', '₹99')">
                    <div class="ott-info">
                        <img src="netflix-logo.png" alt="Netflix">
                        <div class="ott-text">
                            <h3>1 Device • 10 Days</h3>
                        </div>
                    </div>
                    <div class="ott-right">
                        <div class="ott-price">₹99</div>
                        <div class="ott-profile-type">(Private Profile)</div>
                    </div>
                </div>

                <div class="ott-card" onclick="selectPackage(this, '1 Device • 1 Month (Private Profile)', '₹149')">
                    <div class="ott-info">
                        <img src="netflix-logo.png" alt="Netflix">
                        <div class="ott-text">
                            <h3>1 Device • 1 Month</h3>
                        </div>
                    </div>
                    <div class="ott-right">
                        <div class="ott-price">₹149</div>
                        <div class="ott-profile-type">(Private Profile)</div>
                    </div>
                </div>

                <div class="ott-card" onclick="selectPackage(this, '1 Device • 3 Months (Private Profile)', '₹399')">
                    <div class="ott-info">
                        <img src="netflix-logo.png" alt="Netflix">
                        <div class="ott-text">
                            <h3>1 Device • 3 Months</h3>
                        </div>
                    </div>
                    <div class="ott-right">
                        <div class="ott-price">₹399</div>
                        <div class="ott-profile-type">(Private Profile)</div>
                    </div>
                </div>

                <div class="ott-card" onclick="selectPackage(this, '1 Device • 6 Months (Private Profile)', '₹799')">
                    <div class="ott-info">
                        <img src="netflix-logo.png" alt="Netflix">
                        <div class="ott-text">
                            <h3>1 Device • 6 Months</h3>
                        </div>
                    </div>
                    <div class="ott-right">
                        <div class="ott-price">₹799</div>
                        <div class="ott-profile-type">(Private Profile)</div>
                    </div>
                </div>

                <div class="ott-card" onclick="selectPackage(this, '1 Device • 1 Year (Private Profile)', '₹1599')">
                    <div class="ott-info">
                        <img src="netflix-logo.png" alt="Netflix">
                        <div class="ott-text">
                            <h3>1 Device • 1 Year</h3>
                        </div>
                    </div>
                    <div class="ott-right">
                        <div class="ott-price">₹2599</div>
                        <div class="ott-profile-type">(Private Profile)</div>
                    </div>
                </div>

            </div>
        </section>

        <section id="checkout-section" style="margin-top: 30px;">
            <button id="order-now-btn">Complete Order Now</button>
        </section>
    </main>

    <script>
        let selectedPackage = "";
        let selectedPrice = "";

        // Highlight the clicked row
        function selectPackage(card, packageName, price) {
            document.querySelectorAll('.ott-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedPackage = packageName;
            selectedPrice = price;
        }

        // Send straight to payment page
        document.getElementById('order-now-btn').addEventListener('click', () => {
            if (!selectedPackage) {
                alert("Please select a subscription package first!");
                return;
            }

            localStorage.setItem("order_game", "Netflix");
            localStorage.setItem("order_playerId", "Details via WhatsApp"); 
            localStorage.setItem("order_zoneId", "N/A");       
            localStorage.setItem("order_package", selectedPackage);
            localStorage.setItem("order_price", selectedPrice);

            window.location.href = "payment.html";
        });
    </script>
</body>
</html>
