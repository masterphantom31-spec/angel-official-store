<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Premium | Angel Official Store</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Special Row-by-Row Layout for OTT Packages */
        .ott-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 0 15px;
        }
        .ott-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .ott-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 255, 204, 0.4);
        }
        .ott-card.selected {
            border-color: #00ffcc;
            background: rgba(0, 255, 204, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.15);
        }
        
        /* Left Side: Logo and Details */
        .ott-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .ott-info img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            border-radius: 8px;
        }
        .ott-text h3 {
            margin: 0;
            font-size: 16px;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        /* Right Side: Price */
        .ott-right {
            text-align: right;
        }
        .ott-price {
            font-size: 18px;
            color: #00ffcc;
            font-weight: bold;
        }

        /* Email Input Styling */
        .custom-input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #ffffff;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        .custom-input:focus {
            border-color: #00ffcc;
        }
    </style>
</head>
<body>

    <header>
        <a href="javascript:history.back()" style="color: #00ffcc; text-decoration: none; font-size: 24px; margin-right: 15px;">←</a>
        <h1>YouTube Premium</h1>
    </header>

    <main>
        <section id="player-info-section" style="margin-bottom: 25px; padding: 0 15px;">
            <h2 style="font-size: 18px; margin-bottom: 10px; color: #fff;">1. Enter Account Details</h2>
            <div class="input-group">
                <input type="email" id="email-input" class="custom-input" placeholder="Enter your Gmail address" required>
            </div>
        </section>

        <section id="diamond-selection">
            <h2 style="padding: 0 15px; font-size: 18px; margin-bottom: 10px; color: #fff;">2. Select Package</h2>
            
            <div class="ott-list">
                
                <div class="ott-card" onclick="selectPackage(this, '1 Month • Own Mail', '₹35')">
                    <div class="ott-info">
                        <img src="youtube-logo.png" alt="YouTube">
                        <div class="ott-text">
                            <h3>1 Month • Own Mail</h3>
                        </div>
                    </div>
                    <div class="ott-right">
                        <div class="ott-price">₹35</div>
                    </div>
                </div>

                <div class="ott-card" onclick="selectPackage(this, '6 Months • Own Mail', '₹210')">
                    <div class="ott-info">
                        <img src="youtube-logo.png" alt="YouTube">
                        <div class="ott-text">
                            <h3>6 Months • Own Mail</h3>
                        </div>
                    </div>
                    <div class="ott-right">
                        <div class="ott-price">₹210</div>
                    </div>
                </div>

                <div class="ott-card" onclick="selectPackage(this, '1 Year • Own Mail', '₹420')">
                    <div class="ott-info">
                        <img src="youtube-logo.png" alt="YouTube">
                        <div class="ott-text">
                            <h3>1 Year • Own Mail</h3>
                        </div>
                    </div>
                    <div class="ott-right">
                        <div class="ott-price">₹420</div>
                    </div>
                </div>

            </div>
        </section>

        <section id="checkout-section" style="margin-top: 30px;">
            <button id="order-now-btn">Complete Order Now</button>
        </section>
    </main>

    <script>
        let selectedPackage = "";
        let selectedPrice = "";

        function selectPackage(card, packageName, price) {
            document.querySelectorAll('.ott-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedPackage = packageName;
            selectedPrice = price;
        }

        document.getElementById('order-now-btn').addEventListener('click', () => {
            const emailValue = document.getElementById('email-input').value.trim();

            if (!emailValue) {
                alert("Please enter your Gmail address!");
                return;
            }

            if (!selectedPackage) {
                alert("Please select a package first!");
                return;
            }

            // Save details to LocalStorage
            localStorage.setItem("order_game", "YouTube Premium");
            localStorage.setItem("order_playerId", emailValue); 
            localStorage.setItem("order_zoneId", "N/A");       
            localStorage.setItem("order_package", selectedPackage);
            localStorage.setItem("order_price", selectedPrice);

            window.location.href = "payment.html";
        });
    </script>
</body>
</html>
